<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f1e">
<link rel="manifest" href="manifest.json">
<title>RunTrack</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Barlow+Condensed:wght@300;400;600;700&display=swap');

  :root {
    --bg: #090d1a;
    --surface: #111827;
    --border: #1e2d47;
    --accent: #00e5ff;
    --accent2: #ff4081;
    --text: #e8eaf6;
    --muted: #546e7a;
    --success: #69f0ae;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 1000;
    flex-shrink: 0;
  }

  .logo {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--accent2); }

  .header-right { display: flex; align-items: center; gap: 8px; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .status-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 1.5s infinite; }
  .status-dot.waiting { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Wake Lock indicator */
  .wakelock-badge {
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    padding: 2px 6px;
    border-radius: 2px;
    border: 1px solid var(--border);
    color: var(--muted);
    text-transform: uppercase;
    display: none;
  }
  .wakelock-badge.active { border-color: var(--success); color: var(--success); display: block; }

  #map { flex: 1; z-index: 1; }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .stat {
    padding: 10px 8px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }

  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 3px;
  }

  .controls {
    display: flex;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-start { background: var(--accent); color: #000; font-size: 1.1rem; }
  .btn-start:hover { background: #29ebff; transform: translateY(-1px); }
  .btn-start.recording { background: var(--accent2); color: #fff; }

  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    flex: 0 0 auto;
    padding: 14px 16px;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-secondary:disabled { opacity: 0.3; cursor: not-allowed; }

  .position-marker {
    width: 16px; height: 16px;
    background: var(--accent);
    border: 3px solid #fff;
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(0,229,255,0.3), 0 0 20px rgba(0,229,255,0.5);
    animation: positionPulse 2s infinite;
  }
  @keyframes positionPulse {
    0%  { box-shadow: 0 0 0 3px rgba(0,229,255,0.3), 0 0 20px rgba(0,229,255,0.5); }
    50% { box-shadow: 0 0 0 8px rgba(0,229,255,0.1), 0 0 30px rgba(0,229,255,0.3); }
    100%{ box-shadow: 0 0 0 3px rgba(0,229,255,0.3), 0 0 20px rgba(0,229,255,0.5); }
  }
  .start-marker { background: var(--success); animation: none; box-shadow: 0 0 10px var(--success); }
  .end-marker   { background: var(--accent2); animation: none; box-shadow: 0 0 10px var(--accent2); }

  .toast {
    position: fixed;
    top: 70px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 4px;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: all 0.3s;
    z-index: 9999;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .leaflet-tile-pane { filter: brightness(0.85) saturate(0.8); }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-attribution { display: none; }

  .stat-value.fast { color: var(--success); }
  .stat-value.slow { color: var(--muted); }

  /* Install banner */
  #install-banner {
    display: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    flex-shrink: 0;
  }
  #install-banner button {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 4px 12px;
    border-radius: 3px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    cursor: pointer;
    margin-left: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Run<span>Track</span></div>
  <div class="header-right">
    <div class="wakelock-badge" id="wakelock-badge">BILDSCHIRM AN</div>
    <span style="font-size:0.75rem;letter-spacing:0.08em;color:var(--muted);" id="gps-label">GPS SUCHE...</span>
    <div class="status-dot waiting" id="status-dot"></div>
  </div>
</header>

<div id="install-banner">
  Als App installieren für beste Hintergrund-Unterstützung
  <button id="btn-install">Installieren</button>
</div>

<div id="map"></div>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-value" id="stat-dist">0.00</div>
    <div class="stat-label">km</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="stat-time">00:00</div>
    <div class="stat-label">Zeit</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="stat-pace">--:--</div>
    <div class="stat-label">min/km</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="stat-speed">0.0</div>
    <div class="stat-label">km/h</div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-start" id="btn-main" onclick="toggleTracking()">Start</button>
  <button class="btn btn-secondary" onclick="centerMap()" title="Karte zentrieren">⊙</button>
  <button class="btn btn-secondary" id="btn-save" onclick="saveRoute()" disabled title="Route speichern">⬇</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Map ──────────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true, attributionControl: false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
map.setView([48.7665, 9.1800], 15);

// ── State ────────────────────────────────────────────────────────────────────
let isTracking    = false;
let positions     = [];
let polyline      = null;
let posMarker     = null;
let startMarker   = null;
let timerInterval = null;
let startTime     = null;
let totalSeconds  = 0;
let totalDistance = 0;
let lastPos       = null;
let gpsReady      = false;
let wakeLock      = null;
let swReg         = null;

// ── Service Worker ───────────────────────────────────────────────────────────
async function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  try {
    swReg = await navigator.serviceWorker.register('sw.js');
    console.log('SW registered');

    // Listen for GPS updates relayed from SW (when page was in background)
    navigator.serviceWorker.addEventListener('message', e => {
      const { type, payload } = e.data || {};
      if (type === 'GPS_UPDATE' && isTracking) {
        handleGPSPoint(payload.lat, payload.lng, payload.speed);
      }
      if (type === 'BUFFER_RESPONSE') {
        applyBuffer(e.data.payload);
      }
    });
  } catch(err) {
    console.warn('SW registration failed', err);
  }
}

function swPost(msg) {
  if (navigator.serviceWorker?.controller) {
    navigator.serviceWorker.controller.postMessage(msg);
  }
}

function applyBuffer(pts) {
  if (!pts || pts.length === 0) return;
  pts.forEach(p => handleGPSPoint(p.lat, p.lng, null, true));
  showToast(`${pts.length} Punkte aus Hintergrund geladen`);
}

// ── Wake Lock (hält Bildschirm an) ───────────────────────────────────────────
async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    document.getElementById('wakelock-badge').classList.add('active');
    wakeLock.addEventListener('release', () => {
      document.getElementById('wakelock-badge').classList.remove('active');
    });
  } catch(e) {
    console.warn('Wake Lock nicht verfügbar:', e.message);
  }
}

async function releaseWakeLock() {
  if (wakeLock) { await wakeLock.release(); wakeLock = null; }
  document.getElementById('wakelock-badge').classList.remove('active');
}

// Re-acquire wake lock when tab becomes visible again
document.addEventListener('visibilitychange', async () => {
  if (isTracking && document.visibilityState === 'visible') {
    await acquireWakeLock();
    // Request any points buffered by SW while page was hidden
    swPost({ type: 'GET_BUFFER' });
  }
});

// ── GPS ──────────────────────────────────────────────────────────────────────
let watchId = null;

function startGPS() {
  if (!navigator.geolocation) { showToast('GPS nicht verfügbar'); return; }
  watchId = navigator.geolocation.watchPosition(onPosition, onGPSError, {
    enableHighAccuracy: true,
    maximumAge: 2000,
    timeout: 15000
  });
}

function onPosition(pos) {
  const { latitude: lat, longitude: lng, speed } = pos.coords;

  if (!gpsReady) {
    gpsReady = true;
    document.getElementById('gps-label').textContent = 'GPS BEREIT';
    document.getElementById('status-dot').className = 'status-dot';
    showToast('GPS gefunden ✓');
  }

  // Update speed display
  if (speed !== null) updateSpeedDisplay(speed * 3.6);

  // Move position marker
  if (!posMarker) {
    posMarker = L.marker([lat, lng], { icon: makeIcon('') }).addTo(map);
    map.setView([lat, lng], 16);
  } else {
    posMarker.setLatLng([lat, lng]);
  }

  if (isTracking) {
    // Forward point to SW for buffering
    swPost({ type: 'GPS_POINT', payload: { lat, lng, speed, t: Date.now() } });
    handleGPSPoint(lat, lng, speed);
  }
}

function handleGPSPoint(lat, lng, speed, silent = false) {
  const point = [lat, lng];

  if (lastPos) {
    const dist = haversine(lastPos[0], lastPos[1], lat, lng);
    if (dist < 0.003) return; // filter jitter < 3m
    totalDistance += dist;
  }

  positions.push(point);
  if (polyline) polyline.setLatLngs(positions);
  lastPos = point;

  if (!silent) {
    updateStatsDisplay();
    if (speed !== null) updateSpeedDisplay(speed * 3.6);
  }
}

function onGPSError(err) {
  document.getElementById('gps-label').textContent = 'GPS FEHLER';
  showToast('GPS Fehler: ' + err.message);
}

// ── Tracking ─────────────────────────────────────────────────────────────────
async function toggleTracking() {
  if (!gpsReady) { showToast('Warte auf GPS...'); return; }

  if (!isTracking) {
    isTracking = true;
    positions = [];
    totalDistance = 0;
    totalSeconds = 0;
    lastPos = null;
    startTime = Date.now();

    polyline = L.polyline([], {
      color: '#00e5ff', weight: 4, opacity: 0.9,
      lineJoin: 'round', lineCap: 'round'
    }).addTo(map);

    if (posMarker) {
      startMarker = L.marker(posMarker.getLatLng(), { icon: makeIcon('start-marker') }).addTo(map);
    }

    timerInterval = setInterval(() => {
      totalSeconds = Math.floor((Date.now() - startTime) / 1000);
      updateTimeDisplay(totalSeconds);
      updatePaceDisplay();
    }, 1000);

    // Tell SW to start buffering
    swPost({ type: 'START_TRACKING', payload: { existing: [] } });

    // Acquire wake lock to keep screen on
    await acquireWakeLock();

    const btn = document.getElementById('btn-main');
    btn.textContent = '⏹ Stop';
    btn.classList.add('recording');
    document.getElementById('status-dot').className = 'status-dot active';
    document.getElementById('gps-label').textContent = 'AUFNAHME';
    document.getElementById('btn-save').disabled = true;
    showToast('Aufnahme gestartet 🏃');

  } else {
    isTracking = false;
    clearInterval(timerInterval);

    swPost({ type: 'STOP_TRACKING' });
    await releaseWakeLock();

    if (posMarker && positions.length > 0) {
      L.marker(posMarker.getLatLng(), { icon: makeIcon('end-marker') }).addTo(map);
    }

    const btn = document.getElementById('btn-main');
    btn.textContent = 'Neue Route';
    btn.classList.remove('recording');
    document.getElementById('status-dot').className = 'status-dot';
    document.getElementById('gps-label').textContent = 'GPS BEREIT';
    document.getElementById('btn-save').disabled = positions.length < 2;

    if (positions.length > 1) map.fitBounds(polyline.getBounds(), { padding: [40,40] });
    showToast(`Fertig! ${totalDistance.toFixed(2)} km · ${formatTime(totalSeconds)}`);
  }
}

// ── Map helpers ───────────────────────────────────────────────────────────────
function centerMap() {
  if (posMarker) map.setView(posMarker.getLatLng(), 16);
  else showToast('Warte auf GPS...');
}

function makeIcon(cls) {
  return L.divIcon({
    className: '',
    html: `<div class="position-marker ${cls}"></div>`,
    iconSize: [16,16], iconAnchor: [8,8]
  });
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStatsDisplay() {
  document.getElementById('stat-dist').textContent = totalDistance.toFixed(2);
  updatePaceDisplay();
}

function updateTimeDisplay(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  document.getElementById('stat-time').textContent = h > 0
    ? `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
    : `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function updatePaceDisplay() {
  if (totalDistance < 0.01 || totalSeconds < 5) {
    document.getElementById('stat-pace').textContent = '--:--'; return;
  }
  const ps = totalSeconds / totalDistance;
  document.getElementById('stat-pace').textContent =
    `${Math.floor(ps/60)}:${String(Math.floor(ps%60)).padStart(2,'0')}`;
}

function updateSpeedDisplay(kmh) {
  const el = document.getElementById('stat-speed');
  el.textContent = kmh.toFixed(1);
  el.className = 'stat-value' + (kmh > 8 ? ' fast' : kmh < 3 ? ' slow' : '');
}

function formatTime(s) {
  const m = Math.floor(s/60), sec = s%60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

// ── Haversine ─────────────────────────────────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371, toRad = x => x * Math.PI/180;
  const dLat = toRad(lat2-lat1), dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── GPX Export ────────────────────────────────────────────────────────────────
function saveRoute() {
  if (positions.length < 2) return;
  const now = new Date();
  const pts = positions.map(([lat,lon]) =>
    `    <trkpt lat="${lat.toFixed(7)}" lon="${lon.toFixed(7)}"></trkpt>`).join('\n');
  const gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="RunTrack">
  <metadata><time>${now.toISOString()}</time></metadata>
  <trk><name>Lauf ${now.toLocaleDateString('de-DE')}</name>
    <trkseg>
${pts}
    </trkseg>
  </trk>
</gpx>`;
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([gpx], { type: 'application/gpx+xml' })),
    download: `lauf_${now.toISOString().slice(0,10)}.gpx`
  });
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('GPX gespeichert ✓');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── PWA Install prompt ────────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'block';
});
document.getElementById('btn-install').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').style.display = 'none';
  if (outcome === 'accepted') showToast('App installiert ✓');
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
});

// ── Init ──────────────────────────────────────────────────────────────────────
registerSW();
startGPS();
</script>
</body>
</html>
